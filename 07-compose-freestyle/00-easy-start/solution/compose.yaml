version: "3.9"
services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    ports:
      - 3000:3000
    networks:
      - my-network
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    ports:
      - 8070:80
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

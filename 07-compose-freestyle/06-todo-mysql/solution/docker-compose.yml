version: "3.9"

services:
  nginx:
    image: nginx:1.30.2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:8080
    depends_on:
      - todo-api
      - todo-ui
      - phpmyadmin
    networks:
      - extern

  db:
    image: mysql:8.4.0
    volumes:
      - dbdaten:/var/lib/mysql
    env_file: .env.secret
    hostname: db
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 1s
      timeout: 5s
      retries: 20
    networks:
      - intern

  todo-api:
    build:
      context: ./todo-api
    env_file: .env.secret
    depends_on:
      db:
        condition: service_healthy
        restart: true
    networks:
      - intern
      - extern

  todo-ui:
    build:
      context: ./todo-ui
    # ports:
    #   - "3000:3000"
    depends_on:
      - todo-api
    networks:
      - extern

  phpmyadmin:
    image: phpmyadmin:5-apache
    environment:
      - PMA_ARBITRARY=1
    depends_on:
      - db
    networks:
      - extern
      - intern

volumes:
  dbdaten:

networks:
  intern:
  extern:
